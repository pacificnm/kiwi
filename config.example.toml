# Kiwi configuration example
#
# Copy to either:
#   ~/.config/kiwi/config.toml   — user-wide defaults
#   .kiwi.toml                   — project overrides (repository root)
#
# Precedence (highest to lowest):
#   CLI flags → .kiwi.toml → ~/.config/kiwi/config.toml → built-in defaults
#
# See docs/architecture/adr/ADR-005-configuration-system.md
# and docs/specs/SPEC-018-configuration-loader.md

[app]
left_width = 30 # 10–50: left navigation pane width (percent)

[theme]
name = "kiwi-dark"
# custom = "~/.config/kiwi/themes/custom.toml" # overrides bundled theme name

[gui.font]
size = 14.0 # base egui font scale (8.0–32.0)

[editor]
command = "nvim"
# terminal = true   # optional: force suspend/resume (true) or detached (false)

# ── Agent (PTY subprocess — legacy default) ────────────────────────────────
# mode = "pty" spawns the agent as a subprocess and renders its PTY output.
# Use mode = "api" for the native chat panel (recommended for Claude).
#
[agent]
mode = "pty"            # "api" | "pty" (default)
command = "agent"
# args = ["--flag"]
# [agent.env]
# EXAMPLE = "value"

# ── Claude — native API agent (recommended) ────────────────────────────────
# Calls the Anthropic Messages API directly; renders a native chat panel.
# Requires ANTHROPIC_API_KEY set in your environment.
#
# [agent]
# mode = "api"
# provider = "claude"
# model = "claude-opus-4-8"
# api_key_env = "ANTHROPIC_API_KEY"  # default; change if key is stored elsewhere

# ── Claude Code CLI — PTY subprocess (deprecated) ─────────────────────────
# Requires Claude Code installed and authenticated (`claude` on PATH).
# Consider switching to mode = "api" above.
#
# [agent]
# mode = "pty"
# command = "claude"

# ── Ollama / kiwi-ollama PTY agent ────────────────────────────────────────
# Build and install: cargo install --path plugins/kiwi_plugin_ollama
# Requires Ollama running locally with gpt-oss:20b and nomic-embed-text.
#
# [agent]
# mode = "pty"
# command = "kiwi-ollama"
# [agent.env]
# OLLAMA_URL = "http://127.0.0.1:11434"
# OLLAMA_MODEL = "gpt-oss:20b"
# OLLAMA_EMBED_MODEL = "nomic-embed-text"

# ── Ollama native API agent (single model) ────────────────────────────────
# Use one chat model so Ollama does not load multiple large models into RAM.
# Requires: ollama pull gpt-oss:20b
#
# [agent]
# mode = "api"
# active = "ollama"
# tool_profile = "coding"
#
# [agent.providers.ollama]
# api_url = "http://localhost:11434"
# model = "gpt-oss:20b"
# embedding_model = "nomic-embed-text:latest"

# ── Code review agent (read-only profile) ───────────────────────────────────
# Observes only — no file.write, git.commit, or shell tools.
#
# [agent]
# mode = "api"
# active = "claude"
# tool_profile = "code_review"
#
# [agent.providers.claude]
# model = "claude-opus-4-8"
# api_key_env = "ANTHROPIC_API_KEY"

[shell]
command = "bash"
# args = ["-l"]

[mouse]
enabled = true
mode = "hybrid" # "hybrid" | "disabled"

[git]
watch = true
show_untracked = true

[github]
command = "gh"

[workspace]
persist = true
save_interval_secs = 30

[search]
command = "rg"
debounce_ms = 200

[preview]
max_size_bytes = 1048576
line_numbers = true
wrap = false

[diff]
context_lines = 3
word_wrap = false

[watcher]
debounce_ms = 300

[plugins]
enabled = true
# directory = "~/.config/kiwi/plugins"
