name = "kiwi-agent-claude"
version = "0.1.0"
min_kiwi_version = "0.1.0"
display_name = "Claude"
description = "Anthropic Claude — native API agent using the Claude Messages API."
author = "PacificNM"

[agent]
mode = "api"
provider = "claude"
model = "claude-opus-4-8"
api_key_env = "ANTHROPIC_API_KEY"
# tool_profile = "coding"  # file.patch, shell.capture, cargo.test, memory.search, ...
# tool_profile = "code_review"  # read-only: file.read, file.grep, git.diff, cargo.check, memory.search

[install]
kind = "copy"
files = ["plugin.toml"]
