name = "ollama"
version = "0.1.0"
min_kiwi_version = "0.1.0"
display_name = "Ollama"
description = "Local AI models via Ollama — runs as the AI agent in the Agent panel."
author = "PacificNM"

[agent]
mode = "api"
provider = "ollama"
model = "gpt-oss:20b"
api_url = "http://localhost:11434"
# tool_profile = "coding"  # file.patch, shell.capture, cargo.test, memory.search, ...
# tool_profile = "code_review"  # read-only: file.read, file.grep, git.diff, cargo.check, memory.search

[install]
kind = "cargo"
package = "kiwi_plugin_ollama"
library = "kiwi_plugin_ollama"
profile = "release"
binaries = ["kiwi-ollama"]

[[install.extra_packages]]
package = "kiwi_mcp_memory"
binaries = ["kiwi-mcp-memory"]

[[install.extra_packages]]
package = "kiwi_mcp_context"
binaries = ["kiwi-mcp-context"]

[[install.extra_packages]]
package = "kiwi_mcp_git"
binaries = ["kiwi-mcp-git"]

[[install.extra_packages]]
package = "kiwi_mcp_gitnexus"
binaries = ["kiwi-mcp-gitnexus"]
