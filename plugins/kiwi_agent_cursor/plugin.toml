name = "kiwi-agent-cursor"
version = "0.1.0"
min_kiwi_version = "0.1.0"
display_name = "Cursor"
description = "Cursor AI models via the Cursor API — runs as the AI agent in the Agent panel."
author = "PacificNM"

[agent]
mode = "api"
provider = "cursor"
model = "cursor-small"
api_key_env = "CURSOR_API_KEY"
# tool_profile = "coding"  # file.patch, shell.capture, cargo.test, memory.search, ...
# tool_profile = "code_review"  # read-only: file.read, file.grep, git.diff, cargo.check, memory.search
# tool_profile = "github"  # github.issues, github.prs, git.branch, git.commit, git.status, memory.search

[install]
kind = "copy"
files = ["plugin.toml"]
